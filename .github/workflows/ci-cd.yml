name: EnterpriseCommerce-CI

on:
  push:
    branches:
      - master

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore EnterpriseCommerce.slnx

      - name: Build
        run: dotnet build EnterpriseCommerce.slnx --configuration Release --no-restore